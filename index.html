<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KL Divergence</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      display: flex;
      min-height: 100vh;
    }

    /* ── TOC sidebar ── */
    #toc-sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      width: 240px;
      flex-shrink: 0;
      padding: 2rem 1rem 2rem 1.5rem;
      overflow-y: auto;
      border-right: 1px solid #1e2530;
      scrollbar-width: thin;
      scrollbar-color: #2d3748 transparent;
    }

    #toc-sidebar::-webkit-scrollbar { width: 4px; }
    #toc-sidebar::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 2px; }

    #toc-sidebar h2 {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #4a5568;
      margin-bottom: 1rem;
    }

    #toc-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    #toc-list a {
      display: block;
      padding: 3px 8px;
      font-size: 0.82rem;
      color: #718096;
      text-decoration: none;
      border-left: 2px solid transparent;
      border-radius: 0 4px 4px 0;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #toc-list a:hover { color: #cbd5e0; }

    #toc-list a.active {
      color: #63b3ed;
      border-left-color: #63b3ed;
      background: rgba(99, 179, 237, 0.07);
    }

    #toc-list li[data-depth="2"] a { padding-left: 20px; }
    #toc-list li[data-depth="3"] a { padding-left: 36px; font-size: 0.78rem; }

    /* ── Main content ── */
    #content {
      flex: 1;
      max-width: 780px;
      padding: 3rem 3rem 6rem;
      overflow-x: hidden;
    }

    /* ── Markdown styles ── */
    #content h1, #content h2, #content h3,
    #content h4, #content h5, #content h6 {
      color: #f7fafc;
      margin-top: 2.5rem;
      margin-bottom: 0.75rem;
      line-height: 1.3;
      scroll-margin-top: 1.5rem;
    }
    #content h1 { font-size: 2rem; margin-top: 0; }
    #content h2 { font-size: 1.4rem; border-bottom: 1px solid #1e2530; padding-bottom: 0.4rem; }
    #content h3 { font-size: 1.1rem; }

    #content p { line-height: 1.75; color: #a0aec0; margin-bottom: 1rem; }

    #content a { color: #63b3ed; text-decoration: none; }
    #content a:hover { text-decoration: underline; }

    #content code {
      background: #1a202c;
      border: 1px solid #2d3748;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 0.88em;
      font-family: "JetBrains Mono", "Fira Code", monospace;
      color: #f6ad55;
    }

    #content pre {
      background: #1a202c;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 1.25rem;
      overflow-x: auto;
      margin-bottom: 1.25rem;
    }

    #content pre code {
      background: none;
      border: none;
      padding: 0;
      color: #e2e8f0;
      font-size: 0.875rem;
    }

    #content ul, #content ol {
      padding-left: 1.5rem;
      margin-bottom: 1rem;
      color: #a0aec0;
      line-height: 1.8;
    }

    #content blockquote {
      border-left: 3px solid #4a5568;
      padding-left: 1rem;
      margin: 1.25rem 0;
      color: #718096;
      font-style: italic;
    }

    #content hr {
      border: none;
      border-top: 1px solid #1e2530;
      margin: 2rem 0;
    }

    #content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.25rem;
      font-size: 0.9rem;
    }

    #content th, #content td {
      padding: 0.5rem 0.75rem;
      border: 1px solid #2d3748;
      color: #a0aec0;
    }

    #content th { background: #1a202c; color: #e2e8f0; }
  </style>
</head>
<body>

  <nav id="toc-sidebar">
    <h2>On this page</h2>
    <ul id="toc-list"></ul>
  </nav>

  <main id="content"></main>

  <script>
    fetch('Types of Data.md')
      .then(r => r.text())
      .then(raw => render(raw.replace(/!\[\[.*?\]\]/g, '')));

    function render(RAW) {

    // ── Render markdown + math ───────────────────────────────────────────────
    // Extract math before marked touches it (marked breaks $$-inside-paragraphs)
    const mathStore = [];
    const protected_ = RAW
      // block math first
      .replace(/\$\$([\s\S]+?)\$\$/g, (_, tex) => {
        mathStore.push({ tex, display: true });
        return `MATH_PLACEHOLDER_${mathStore.length - 1}_END`;
      })
      // then inline math
      .replace(/\$([^\n$]+?)\$/g, (_, tex) => {
        mathStore.push({ tex, display: false });
        return `MATH_PLACEHOLDER_${mathStore.length - 1}_END`;
      });

    const contentEl = document.getElementById('content');
    contentEl.innerHTML = marked.parse(protected_);

    // Restore and render each math placeholder with KaTeX
    contentEl.querySelectorAll('*').forEach(node => {
      node.childNodes.forEach(child => {
        if (child.nodeType !== Node.TEXT_NODE) return;
        const text = child.textContent;
        if (!text.includes('MATH_PLACEHOLDER_')) return;
        const span = document.createElement('span');
        span.innerHTML = text.replace(/MATH_PLACEHOLDER_(\d+)_END/g, (_, i) => {
          const { tex, display } = mathStore[+i];
          try {
            return katex.renderToString(tex, { displayMode: display, throwOnError: false });
          } catch {
            return tex;
          }
        });
        child.replaceWith(span);
      });
    });

    // ── Assign ids to headings ───────────────────────────────────────────────
    const headings = contentEl.querySelectorAll('h1, h2, h3');
    headings.forEach(h => {
      if (!h.id) {
        h.id = h.textContent
          .toLowerCase()
          .replace(/[^\w\s-]/g, '')
          .trim()
          .replace(/\s+/g, '-');
      }
    });

    // ── Build TOC ────────────────────────────────────────────────────────────
    const tocList = document.getElementById('toc-list');
    headings.forEach(h => {
      const depth = parseInt(h.tagName[1]);
      const li = document.createElement('li');
      li.dataset.depth = depth;
      const a = document.createElement('a');
      a.href = `#${h.id}`;
      a.textContent = h.textContent;
      li.appendChild(a);
      tocList.appendChild(li);
    });

    // ── Scroll spy ───────────────────────────────────────────────────────────
    const tocLinks = tocList.querySelectorAll('a');
    const linkMap = {};
    tocLinks.forEach(a => { linkMap[a.getAttribute('href').slice(1)] = a; });

    let activeId = null;

    function updateActive() {
      const atBottom = window.scrollY + window.innerHeight >= document.body.scrollHeight - 10;
      const threshold = window.scrollY + window.innerHeight * 0.2;
      let current = atBottom ? headings[headings.length - 1] : headings[0];
      if (!atBottom) for (const h of headings) {
        if (h.offsetTop <= threshold) current = h;
        else break;
      }
      const newId = current ? current.id : null;
      if (newId === activeId) return;
      if (activeId && linkMap[activeId]) linkMap[activeId].classList.remove('active');
      if (newId && linkMap[newId]) linkMap[newId].classList.add('active');
      activeId = newId;
    }

    window.addEventListener('scroll', updateActive, { passive: true });
    updateActive();
    }
  </script>
</body>
</html>
